<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Mobile Browser</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      padding: 10px 16px;
      background: #161820;
      border-bottom: 1px solid #2d2f3a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 20;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #58a6ff;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    select {
      padding: 6px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    select:focus {
      border-color: #58a6ff;
    }

    button {
      padding: 6px 14px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    button:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    button.primary {
      background: #238636;
      border-color: #2ea043;
      color: #fff;
    }

    button.primary:hover {
      background: #2ea043;
    }

    button.danger {
      background: #da3633;
      border-color: #b91c1c;
      color: #fff;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f85149;
      flex-shrink: 0;
      transition: background .3s;
    }

    .status-dot.connected {
      background: #3fb950;
    }

    .status-dot.connecting {
      background: #d29922;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* ── Mobile frame ── */
    .mobile-frame {
      margin: 16px auto 0;
      border: 10px solid #2d2f3a;
      border-radius: 32px;
      background: #000;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 40px rgba(0, 0, 0, .6);
      flex-shrink: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: default;
      image-rendering: auto;
      -webkit-user-select: none;
      user-select: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #8b949e;
      font-size: 15px;
      text-align: center;
      padding: 20px;
      z-index: 5;
    }

    .overlay.hidden {
      display: none;
    }

    /* ── Info bar ── */
    .info-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 6px 16px;
      font-size: 11px;
      color: #484f58;
      width: 100%;
      max-width: 480px;
    }

    /* ── Scroll buttons ── */
    .scroll-bar {
      display: flex;
      gap: 8px;
      padding: 6px 16px 4px;
      width: 100%;
      max-width: 480px;
      justify-content: center;
    }

    .scroll-bar button {
      font-size: 12px;
      padding: 5px 12px;
    }

    /* ── Audio banner ── */
    #audioBanner {
      width: 100%;
      max-width: 480px;
      padding: 6px 16px;
      font-size: 12px;
      text-align: center;
      color: #8b949e;
    }

    /* ── Text input ── */
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 6px 16px 16px;
      width: 100%;
      max-width: 480px;
    }

    .input-bar input {
      flex: 1;
      padding: 9px 12px;
      background: #161820;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      outline: none;
    }

    .input-bar input:focus {
      border-color: #58a6ff;
    }
  </style>
</head>

<body>

  <!-- ── Header ── -->
  <div class="header">
    <h1>📱 Remote Browser</h1>
    <div class="controls">
      <select id="platformSelect">
        <option value="instagram">Instagram</option>
        <option value="tiktok">TikTok</option>
        <option value="youtube">YouTube</option>
        <option value="facebook">Facebook</option>
        <option value="x">Twitter / X</option>
        <option value="linkedin">LinkedIn</option>
        <option value="discord">Discord</option>
        <option value="messenger">Messenger</option>
        <option value="telegram">Telegram</option>
        <option value="google">Google</option>
      </select>
      <div class="status-dot" id="statusDot"></div>
      <button class="primary" id="startBtn" onclick="startSession()">Start</button>
      <button id="stopBtn" onclick="stopSession()" disabled>Stop</button>
    </div>
  </div>

  <!-- ── Mobile frame ── -->
  <div class="mobile-frame" id="mobileFrame">
    <canvas id="screen" style="display: none;"></canvas>
    <div class="overlay" id="overlay">Select a platform and click Start</div>
  </div>

  <!-- ── Stats ── -->
  <div class="info-bar">
    <span id="resolutionEl">—</span>
    <span id="fpsEl">0 fps</span>
    <span id="audioStatsEl">no audio</span>
    <span id="audioMethodEl">—</span>
  </div>

  <!-- ── Scroll buttons ── -->
  <div class="scroll-bar" id="scrollBar" style="display:none">
    <button id="scrollTopBtn">▲▲ Top</button>
    <button id="scrollUpBtn">▲ Up</button>
    <button id="scrollDownBtn">▼ Down</button>
    <button id="scrollBotBtn">▼▼ Bot</button>
  </div>

  <!-- ── Audio banner + controls ── -->
  <div id="audioBanner">🔇 Audio not started</div>
  <div class="input-bar" style="padding-bottom:4px; gap:6px;">
    <button onclick="window.audioDebug?.()" style="background:#1f6feb;border-color:#1f6feb;font-size:12px;flex:1">
      🔍 Audio Debug
    </button>
    <button id="forcePlayBtn" onclick="forcePlayAudio()"
      style="background:#238636;border-color:#2ea043;font-size:12px;flex:1">
      ▶ Force Play Audio
    </button>
    <button onclick="forceUnmuteRemote()" style="background:#6e40c9;border-color:#8957e5;font-size:12px;flex:1">
      🔊 Force Unmute
    </button>
  </div>

  <!-- ── Text input ── -->
  <div class="input-bar">
    <input id="textInput" type="text" placeholder="Type text to send…"
      onkeydown="if(event.key==='Enter'){sendText();event.preventDefault();}">
    <button onclick="sendText()">Send</button>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // Config
    // ═══════════════════════════════════════════════════════════════════════════
    const SERVER_URL = (() => {
      const origin = window.location.origin;
      if (origin.includes(":3000")) return origin;
      return "http://localhost:3000";
    })();
    console.log("[Config] SERVER_URL:", SERVER_URL);

    // ── IMPORTANT: these MUST match MOBILE_WIDTH / MOBILE_HEIGHT in server.js ──
    const SERVER_W = 390;   // matches server.js MOBILE_WIDTH
    const SERVER_H = 844;   // matches server.js MOBILE_HEIGHT

    // Display size in the browser window (CSS pixels).
    // Adjust to taste — the canvas will scale to fill this.
    const DISPLAY_W = 390;
    const DISPLAY_H = 700;

    // ── Pick best audio MIME this browser supports ──────────────────────────────
    const AUDIO_MIME_CANDIDATES = [
      "audio/webm;codecs=opus",       // Chrome/Firefox desktop
      'audio/mp4;codecs="mp4a.40.2"', // Safari / iOS / some Android
      "audio/mpeg",                   // MP3 fallback
    ];
    function pickAudioMime() {
      if (!window.MediaSource) return null;
      for (const m of AUDIO_MIME_CANDIDATES) {
        if (MediaSource.isTypeSupported(m)) return m;
      }
      return null;
    }
    let AUDIO_MIME = pickAudioMime();
    const isMobileBrowser = /iP(hone|od|ad)|Android/.test(navigator.userAgent);
    console.log("[Audio] Selected MIME:", AUDIO_MIME);

    // ═══════════════════════════════════════════════════════════════════════════
    // DOM refs
    // ═══════════════════════════════════════════════════════════════════════════
    const canvas = document.getElementById("screen");
    const ctx2d = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const statusDot = document.getElementById("statusDot");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const platformSel = document.getElementById("platformSelect");
    const mobileFrame = document.getElementById("mobileFrame");
    const scrollBar = document.getElementById("scrollBar");
    const fpsEl = document.getElementById("fpsEl");
    const audioStatsEl = document.getElementById("audioStatsEl");
    const audioMethodEl = document.getElementById("audioMethodEl");
    const resolutionEl = document.getElementById("resolutionEl");
    const audioBanner = document.getElementById("audioBanner");

    // ═══════════════════════════════════════════════════════════════════════════
    // Canvas setup — intrinsic = server resolution, CSS = display size
    // ═══════════════════════════════════════════════════════════════════════════
    function setupCanvas() {
      canvas.style.width = DISPLAY_W + "px";
      canvas.style.height = DISPLAY_H + "px";
      mobileFrame.style.width = DISPLAY_W + "px";
      mobileFrame.style.height = DISPLAY_H + "px";
    }
    setupCanvas();

    // ═══════════════════════════════════════════════════════════════════════════
    // State
    // ═══════════════════════════════════════════════════════════════════════════
    let sessionId = null;
    let ws = null;
    let streaming = false;

    // Logical server dimensions — updated from stream-started msg if server reports custom size
    let logicalW = SERVER_W;
    let logicalH = SERVER_H;

    // Mouse position (shared between mousemove listener and keyboard scroll handler)
    let lastMouseX = Math.round(SERVER_W / 2);
    let lastMouseY = Math.round(SERVER_H / 2);

    // ═══════════════════════════════════════════════════════════════════════════
    // Audio — MediaSource Extensions pipeline
    // ═══════════════════════════════════════════════════════════════════════════
    let mediaSource = null;
    let sourceBuffer = null;
    let audioEl = null;
    let audioReady = false;
    const audioQueue = [];

    let audioChunkCount = 0;
    let audioByteCount = 0;
    let lastAudioStatTs = performance.now();
    let totalAudioChunksReceived = 0;

    function setAudioBanner(msg, color) {
      audioBanner.textContent = msg;
      audioBanner.style.color = color || "#8b949e";
      console.log("[AudioBanner]", msg);
    }

    function initAudio() {
      if (audioEl) { console.log("[Audio] Already initialised"); return; }

      if (!AUDIO_MIME) {
        setAudioBanner("⚠ No supported audio codec in this browser", "#f85149");
        return;
      }

      console.log("[Audio] Initialising MSE pipeline — MIME:", AUDIO_MIME);

      const tagName = "audio"; // Always use audio element
      audioEl = document.createElement(tagName);
      audioEl.volume = 1.0;
      audioEl.autoplay = true;
      audioEl.playsInline = true;
      audioEl.muted = false;
      audioEl.controls = false;
      // visibility:hidden keeps it in the render tree (Chrome sees it as active audio)
      // but display:none removes it from the tree (Chrome ignores it for tab indicator)
      audioEl.style.cssText = "position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;bottom:0;left:0;";
      document.body.appendChild(audioEl);

      ["play", "pause", "playing", "waiting", "stalled", "ended", "error", "canplay"].forEach(ev => {
        audioEl.addEventListener(ev, () =>
          console.log(`[Audio] <${tagName}> "${ev}" | paused=${audioEl.paused} | time=${audioEl.currentTime.toFixed(2)} | rS=${audioEl.readyState}`)
        );
      });
      audioEl.addEventListener("error", () => {
        const e = audioEl.error;
        console.error("[Audio] MediaError:", e ? `code=${e.code} msg=${e.message}` : "unknown");
        setAudioBanner("⚠ Audio playback error — see console", "#f85149");
      });

      mediaSource = new MediaSource();

      mediaSource.addEventListener("sourceopen", () => {
        console.log("[Audio] sourceopen — readyState:", mediaSource.readyState);
        try {
          sourceBuffer = mediaSource.addSourceBuffer(AUDIO_MIME);
          sourceBuffer.mode = "sequence";
          console.log("[Audio] SourceBuffer created, mode=sequence");

          let playTriggered = false;
          sourceBuffer.addEventListener("updateend", () => {
            if (sourceBuffer.buffered.length > 0 && !playTriggered && audioEl?.paused) {
              playTriggered = true;
              console.log("[Audio] First chunk buffered — calling play()");
              audioEl.play()
                .then(() => {
                  console.log("[Audio] ✓ play() resolved");
                  setAudioBanner("🔊 Audio streaming live", "#3fb950");
                })
                .catch((err) => {
                  console.warn("[Audio] play() blocked:", err.name, err.message);
                  setAudioBanner("👆 Click page or tap ▶ Force Play Audio to enable sound", "#d29922");
                });
            }
            drainAudioQueue();
          });

          sourceBuffer.addEventListener("error", (e) => {
            console.error("[Audio] SourceBuffer error:", e);
            setAudioBanner("⚠ Audio buffer error", "#f85149");
          });

          audioReady = true;
          console.log("[Audio] Ready — draining", audioQueue.length, "buffered chunks");
          drainAudioQueue();
          setAudioBanner("⏳ Audio ready — waiting for first chunk…", "#d29922");
        } catch (e) {
          console.error("[Audio] SourceBuffer init error:", e.name, e.message);
          setAudioBanner("⚠ MSE init error: " + e.message, "#f85149");
        }
      });

      mediaSource.addEventListener("sourceclose", () => console.warn("[Audio] sourceclose"));
      mediaSource.addEventListener("error", () => console.error("[Audio] MediaSource error"));

      audioEl.src = URL.createObjectURL(mediaSource);
      console.log("[Audio] src set to blob URL");
    }

    function forcePlayAudio() {
      if (!audioEl) { setAudioBanner("⚠ Audio not initialised yet", "#f85149"); return; }
      audioEl.muted = false;
      audioEl.volume = 1.0;
      audioEl.play()
        .then(() => setAudioBanner("🔊 Playing!", "#3fb950"))
        .catch((e) => setAudioBanner("✗ " + e.message, "#f85149"));
    }

    // Sends a command to the server to re-unmute all videos in the browser page
    function forceUnmuteRemote() {
      sendInput({ type: "__unmute__" });  // handled in inputHandler
      setAudioBanner("🔊 Unmute command sent to remote browser", "#3fb950");
    }

    // Resume on any user interaction (handles autoplay policy)
    function resumeAudioOnGesture() {
      if (audioEl && audioEl.paused && audioReady) {
        audioEl.play()
          .then(() => setAudioBanner("🔊 Audio streaming live", "#3fb950"))
          .catch(() => { });
      }
    }
    document.addEventListener("click", resumeAudioOnGesture, { passive: true });
    document.addEventListener("keydown", resumeAudioOnGesture, { passive: true });
    document.addEventListener("touchend", resumeAudioOnGesture, { passive: true });

    // Diagnostics
    window.audioDebug = () => {
      console.group("🎵 Audio Diagnostics");
      console.log("AUDIO_MIME:", AUDIO_MIME, "| supported:", MediaSource?.isTypeSupported?.(AUDIO_MIME));
      console.log("audioEl:", audioEl
        ? { paused: audioEl.paused, volume: audioEl.volume, readyState: audioEl.readyState, currentTime: audioEl.currentTime }
        : null);
      console.log("mediaSource readyState:", mediaSource?.readyState);
      console.log("sourceBuffer:", sourceBuffer
        ? {
          updating: sourceBuffer.updating, buffered: sourceBuffer.buffered.length > 0
            ? `${sourceBuffer.buffered.start(0).toFixed(2)}–${sourceBuffer.buffered.end(sourceBuffer.buffered.length - 1).toFixed(2)}s`
            : "empty"
        }
        : null);
      console.log("audioReady:", audioReady);
      console.log("audioQueue.length:", audioQueue.length);
      console.log("totalAudioChunksReceived:", totalAudioChunksReceived);
      console.groupEnd();
      alert("Audio diagnostics in console (F12)");
    };

    function drainAudioQueue() {
      if (!sourceBuffer || !audioReady || sourceBuffer.updating || audioQueue.length === 0) return;

      // Drop queue if too far ahead (prevents unbounded growth / desync)
      if (sourceBuffer.buffered.length > 0 && audioEl) {
        const ahead = sourceBuffer.buffered.end(sourceBuffer.buffered.length - 1) - audioEl.currentTime;
        if (ahead > 3.0) {
          console.warn("[Audio] Buffer lead", ahead.toFixed(2), "s — dropping queue");
          audioQueue.length = 0;
          return;
        }
      }

      const chunk = audioQueue.shift();
      try {
        sourceBuffer.appendBuffer(chunk);
      } catch (e) {
        if (e.name === "QuotaExceededError") pruneAudioBuffer();
        else { console.error("[Audio] appendBuffer error:", e.name); audioQueue.length = 0; }
      }
    }

    function pruneAudioBuffer() {
      if (!sourceBuffer || sourceBuffer.updating || !audioEl) return;
      const start = sourceBuffer.buffered.length > 0 ? sourceBuffer.buffered.start(0) : 0;
      const pruneEnd = Math.max(start, audioEl.currentTime - 3);
      if (pruneEnd > start) {
        try { sourceBuffer.remove(start, pruneEnd); } catch { }
      }
    }

    function receiveAudioChunk(buf) {
      totalAudioChunksReceived++;
      if (buf.byteLength < 4) return; // too small to be a valid cluster

      if (totalAudioChunksReceived <= 5) {
        const bytes = new Uint8Array(buf.slice(0, 4));
        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join(" ");
        const webmOk = hex.startsWith("1a 45 df a3");
        console.log(`[Audio] Chunk #${totalAudioChunksReceived}: ${buf.byteLength}B | ${hex}${totalAudioChunksReceived === 1 ? (webmOk ? " ✓ WebM" : " ✗ NOT WebM — check codec") : ""}`);
      }

      audioChunkCount++;
      audioByteCount += buf.byteLength;
      const now = performance.now();
      if (now - lastAudioStatTs >= 1000) {
        const msg = `${audioChunkCount}/s · ${(audioByteCount / 1024).toFixed(1)} KB/s · ${totalAudioChunksReceived} total`;
        audioStatsEl.textContent = msg;
        if (audioEl && !audioEl.paused) setAudioBanner("🔊 Audio streaming live", "#3fb950");
        audioChunkCount = 0; audioByteCount = 0; lastAudioStatTs = now;
      }

      if (!audioReady) {
        if (audioQueue.length < 300) audioQueue.push(buf);
        return;
      }
      audioQueue.push(buf);
      drainAudioQueue();
    }

    function stopAudio() {
      audioReady = false;
      audioQueue.length = 0;
      if (audioEl) {
        audioEl.pause();
        try { if (mediaSource?.readyState === "open") mediaSource.endOfStream(); } catch { }
        audioEl.src = "";
        audioEl.remove();
        audioEl = null;
      }
      mediaSource = null;
      sourceBuffer = null;
      setAudioBanner("🔇 Audio stopped");
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Video rendering
    // ═══════════════════════════════════════════════════════════════════════════
    let pendingBitmap = null;
    let rafScheduled = false;
    let frameCount = 0;
    let lastFpsTs = performance.now();

    function receiveVideoFrame(buf) {
      frameCount++;
      const now = performance.now();
      if (now - lastFpsTs >= 1000) {
        fpsEl.textContent = frameCount + " fps";
        frameCount = 0; lastFpsTs = now;
      }
      createImageBitmap(new Blob([buf], { type: "image/jpeg" }))
        .then(bitmap => {
          // Auto-fit canvas intrinsic size to actual frame dimensions (2× for sharp rendering)
          if (canvas.width !== bitmap.width || canvas.height !== bitmap.height) {
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            ctx2d.imageSmoothingEnabled = true;
            ctx2d.imageSmoothingQuality = "high";
            resolutionEl.textContent = `${bitmap.width}×${bitmap.height}`;
            console.log(`[Video] Canvas resized to ${bitmap.width}×${bitmap.height}`);
          }
          if (pendingBitmap) pendingBitmap.close();
          pendingBitmap = bitmap;
          if (!rafScheduled) { rafScheduled = true; requestAnimationFrame(paintFrame); }
        })
        .catch(() => { });
    }

    function paintFrame() {
      rafScheduled = false;
      if (!pendingBitmap) return;
      ctx2d.drawImage(pendingBitmap, 0, 0, canvas.width, canvas.height);
      pendingBitmap.close();
      pendingBitmap = null;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Session management
    // ═══════════════════════════════════════════════════════════════════════════
    async function startSession() {
      setStatus("connecting");
      startBtn.disabled = true;
      platformSel.disabled = true;

      // Init audio pipeline (needs user gesture context — we're inside a click handler)
      if (AUDIO_MIME) {
        initAudio();
      } else {
        console.warn("[Audio] No supported MIME — audio disabled");
        setAudioBanner("⚠ Audio not supported in this browser", "#f85149");
      }


      try {
        const codecForServer = !AUDIO_MIME ? "none"
          : AUDIO_MIME.includes("webm") ? "opus"
            : AUDIO_MIME.includes("mp4") ? "aac"
              : "opus";

        const r = await fetch(SERVER_URL + "/start-session", {
          method: "POST",
          headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "1" },
          body: JSON.stringify({ platform: platformSel.value, audioCodec: codecForServer }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);

        const data = await r.json();
        sessionId = data.sessionId;

        const methodLabels = {
          opus: "🎵 Opus/WebM",
          aac: "🎵 AAC/MP4",
          mp3: "🎵 MP3",
          windows: "🎵 Windows (dshow)",
          pulseaudio: "🎵 PulseAudio",
          none: "❌ No audio",
        };
        audioMethodEl.textContent = methodLabels[data.audioMethod] || data.audioMethod;
        if (data.audioMethod === "none") {
          setAudioBanner("⚠ Server: no audio device found — install VB-Cable or enable Stereo Mix", "#f85149");
        }

        const proto = SERVER_URL.startsWith("https") ? "wss" : "ws";
        const host = SERVER_URL.replace(/^https?:\/\//, "");
        ws = new WebSocket(`${proto}://${host}`);
        ws.binaryType = "arraybuffer";

        ws.onopen = () => ws.send(JSON.stringify({ sessionId, type: "start-stream" }));

        ws.onmessage = (evt) => {
          if (evt.data instanceof ArrayBuffer) {
            const type = new Uint8Array(evt.data)[0];
            const payload = evt.data.slice(1);
            if (type === 0x01) receiveVideoFrame(payload);
            else if (type === 0x02) receiveAudioChunk(payload);
            return;
          }
          try {
            const msg = JSON.parse(evt.data);
            handleControl(msg);
          } catch { }
        };

        ws.onclose = () => { setStatus("disconnected"); cleanup(); };
        ws.onerror = () => { setStatus("disconnected"); cleanup(); };

      } catch (err) {
        console.error("[startSession]", err);
        setStatus("disconnected");
        cleanup();
        alert("Failed to start: " + err.message);
      }
    }

    function stopSession() {
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ sessionId, type: "stop-stream" }));
        ws.close();
      }
      overlay.classList.remove("hidden");
      overlay.textContent = "Session ended";
      cleanup();
    }

    function cleanup() {
      streaming = false;
      startBtn.disabled = false;
      platformSel.disabled = false;
      stopBtn.disabled = true;
      scrollBar.style.display = "none";
      stopAudio();
      canvas.style.display = "none";
      overlay.classList.remove("hidden");
    }

    function handleControl(msg) {
      switch (msg.type) {
        case "stream-started":
          setStatus("connected");
          streaming = true;
          overlay.classList.add("hidden");
          stopBtn.disabled = false;
          scrollBar.style.display = "flex";
          canvas.style.display = "block";
          // Update logical dimensions if server reports custom viewport size
          if (msg.width && msg.width !== logicalW) logicalW = msg.width;
          if (msg.height && msg.height !== logicalH) logicalH = msg.height;
          lastMouseX = Math.round(logicalW / 2);
          lastMouseY = Math.round(logicalH / 2);
          attachCanvasListeners();
          break;
        case "stream-stopped":
          streaming = false;
          break;
        case "session-ended":
          overlay.classList.remove("hidden");
          overlay.textContent = msg.message || "Session ended";
          cleanup();
          break;
        case "error":
          console.error("[Server error]", msg.message);
          break;
      }
    }

    function setStatus(s) { statusDot.className = "status-dot " + s; }

    // ═══════════════════════════════════════════════════════════════════════════
    // Input forwarding
    // ═══════════════════════════════════════════════════════════════════════════
    function sendInput(data) {
      if (ws?.readyState === WebSocket.OPEN && sessionId) {
        ws.send(JSON.stringify({ sessionId, ...data }));
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Canvas input listeners — attached once when stream starts
    // ═══════════════════════════════════════════════════════════════════════════
    let canvasListenersAttached = false;
    function attachCanvasListeners() {
      if (canvasListenersAttached) return;
      canvasListenersAttached = true;

      // Helper: scale CSS coords → server logical pixels
      function scaleX(clientX) {
        const rect = canvas.getBoundingClientRect();
        return Math.round((clientX - rect.left) * (logicalW / rect.width));
      }
      function scaleY(clientY) {
        const rect = canvas.getBoundingClientRect();
        return Math.round((clientY - rect.top) * (logicalH / rect.height));
      }

      // ── Click ──
      canvas.addEventListener("click", (e) => {
        if (!streaming) return;
        e.preventDefault();
        sendInput({ type: "click", x: scaleX(e.clientX), y: scaleY(e.clientY) });
      });

      // ── Mouse wheel ──
      canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        if (!streaming) return;
        let dx = e.deltaX, dy = e.deltaY;
        if (e.deltaMode === 1) { dx *= 40; dy *= 40; }
        else if (e.deltaMode === 2) { dx *= 800; dy *= 800; }
        dx = Math.max(-400, Math.min(400, dx));
        dy = Math.max(-400, Math.min(400, dy));
        sendInput({
          type: "scroll",
          x: scaleX(e.clientX), y: scaleY(e.clientY),
          deltaX: Math.round(dx), deltaY: Math.round(dy),
        });
      }, { passive: false });

      // ── Touch ──
      let touchStartX = 0, touchStartY = 0, touchLastY = 0, touchStartTime = 0;

      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = touchLastY = t.clientY;
        touchStartTime = Date.now();
      }, { passive: false });

      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        if (!streaming) return;
        const t = e.touches[0];
        const dy = (touchLastY - t.clientY) * 2.5;
        touchLastY = t.clientY;
        if (Math.abs(dy) < 1) return;
        sendInput({
          type: "scroll",
          x: scaleX(touchStartX), y: Math.round(logicalH / 2),
          deltaX: 0, deltaY: Math.round(dy),
        });
      }, { passive: false });

      canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        if (!streaming) return;
        const t = e.changedTouches[0];
        const dt = Date.now() - touchStartTime;
        const dx = Math.abs(t.clientX - touchStartX);
        const dy = Math.abs(t.clientY - touchStartY);
        if (dt < 300 && dx < 12 && dy < 12) {
          sendInput({ type: "click", x: scaleX(touchStartX), y: scaleY(touchStartY) });
        }
      }, { passive: false });

      // ── Mouse tracking (for keyboard scroll) ──
      canvas.addEventListener("mousemove", (e) => {
        lastMouseX = scaleX(e.clientX);
        lastMouseY = scaleY(e.clientY);
      }, { passive: true });

      console.log("[Input] Canvas event listeners attached");
    }





    // ── Scroll buttons (hold to repeat) ──
    function makeScrollBtn(id, dy) {
      const btn = document.getElementById(id);
      let iv = null;
      const fire = () => { if (streaming) sendInput({ type: "scroll", x: Math.round(logicalW / 2), y: Math.round(logicalH / 2), deltaX: 0, deltaY: dy }); };
      const start = (e) => { e.preventDefault(); fire(); iv = setInterval(fire, 80); };
      const stop = () => clearInterval(iv);
      btn.addEventListener("mousedown", start);
      btn.addEventListener("touchstart", start, { passive: false });
      btn.addEventListener("mouseup", stop);
      btn.addEventListener("mouseleave", stop);
      btn.addEventListener("touchend", stop);
    }
    makeScrollBtn("scrollTopBtn", -3000);
    makeScrollBtn("scrollUpBtn", -300);
    makeScrollBtn("scrollDownBtn", 300);
    makeScrollBtn("scrollBotBtn", 3000);

    // ── Keyboard ──

    document.addEventListener("keydown", (e) => {
      if (document.activeElement === document.getElementById("textInput") || !streaming) return;
      const scrollKeys = { ArrowDown: 120, ArrowUp: -120, PageDown: 600, PageUp: -600 };
      if (scrollKeys[e.key] !== undefined) {
        e.preventDefault();
        sendInput({ type: "scroll", x: lastMouseX, y: lastMouseY, deltaX: 0, deltaY: scrollKeys[e.key] });
        return;
      }
      e.preventDefault();
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        sendInput({ type: "keypress", key: e.key });
      } else {
        sendInput({ type: "keydown", key: e.key });
      }
    });

    document.addEventListener("keyup", (e) => {
      if (document.activeElement === document.getElementById("textInput") || !streaming) return;
      if (e.key.length > 1) sendInput({ type: "keyup", key: e.key });
    });

    function sendText() {
      const el = document.getElementById("textInput");
      if (!el.value) return;
      sendInput({ type: "type", text: el.value });
      el.value = "";
    }
  </script>
