<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Remote Browser Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080c10;
      --surface: #0f1419;
      --surface2: #161d26;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #00d4ff;
      --accent2: #7c6aff;
      --green: #00e676;
      --red: #ff4c6a;
      --amber: #ffb300;
      --text: #e8edf2;
      --muted: #5a6a7a;
      --r: 12px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .app {
      display: grid;
      grid-template-rows: 52px 1fr 56px;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      z-index: 10;
    }

    .brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--accent);
      white-space: nowrap;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      max-width: 120px;
    }

    select:focus {
      border-color: var(--accent);
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: var(--surface);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn.start {
      background: linear-gradient(135deg, #006aff, #00d4ff);
      border: none;
      color: #000;
    }

    .btn.start:hover:not(:disabled) {
      filter: brightness(1.1);
    }

    .btn.stop {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── STATUS ROW ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .dot.connected {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    .dot.connecting {
      background: var(--amber);
      box-shadow: 0 0 8px var(--amber);
      animation: pulse 0.6s infinite;
    }

    .dot.disconnected {
      background: var(--red);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── VIDEO CONTAINER ── */
    .video-wrap {
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #screen {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
      /* Crisp rendering — no browser softening */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      outline: none;
      /* GPU compositing hint */
      transform: translateZ(0);
      will-change: contents;
    }

    /* ── OVERLAY ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 16, 0.92);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      transition: opacity 0.25s, visibility 0.25s;
      z-index: 5;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .overlay-icon {
      font-size: 48px;
      opacity: 0.6;
    }

    .overlay-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .overlay-text strong {
      color: var(--text);
    }

    /* Play button inside overlay */
    .play-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, #006aff, #00d4ff);
      border: none;
      border-radius: 30px;
      color: #000;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    /* ── STATS OVERLAY (top-right corner when streaming) ── */
    #statsOverlay {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      pointer-events: none;
      z-index: 6;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #statsOverlay.visible {
      opacity: 1;
    }

    /* ── TYPING BADGE ── */
    #typingBadge {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent2);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #typingBadge.active {
      opacity: 1;
    }

    /* ── BOTTOM BAR ── */
    .bottombar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #textInput {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--accent);
      min-width: 0;
    }

    #textInput:focus {
      border-color: var(--accent);
    }

    #textInput.active {
      border-color: var(--accent2);
    }

    #textInput::placeholder {
      color: var(--muted);
      font-size: 12px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .icon-btn:hover {
      background: var(--surface);
    }

    /* ── SCROLL CONTROLS ── */
    #scrollControls {
      display: none;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      flex-direction: column;
      gap: 4px;
      z-index: 8;
    }

    #scrollControls.visible {
      display: flex;
    }

    .scroll-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .scroll-btn:hover {
      background: rgba(0, 212, 255, 0.2);
    }

    /* ── RECONNECT TOAST ── */
    #toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--amber);
      color: #000;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 30px;
      z-index: 100;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="brand">⚡ LiveBrowser</div>
      <div class="topbar-right">
        <div class="status-row">
          <div class="dot" id="dot"></div>
          <span id="connLabel">off</span>
          <span id="fpsLabel" style="display:none">·</span>
          <span id="latLabel" style="display:none">·</span>
        </div>
        <select id="platformSel">
          <option value="instagram">Instagram</option>
          <option value="tiktok">TikTok</option>
          <option value="youtube">YouTube</option>
          <option value="facebook">Facebook</option>
          <option value="x">Twitter / X</option>
          <option value="linkedin">LinkedIn</option>
          <option value="discord">Discord</option>
          <option value="messenger">Messenger</option>
          <option value="telegram">Telegram</option>
          <option value="google">Google</option>
        </select>
        <button class="btn start" id="startBtn" onclick="startSession()">▶ Start</button>
        <button class="btn stop" id="stopBtn" onclick="stopSession()" disabled>■</button>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="video-wrap" id="videoWrap">
      <video id="screen" autoplay playsinline muted tabindex="0"></video>

      <div class="overlay" id="overlay">
        <div class="overlay-icon">📱</div>
        <div class="overlay-text">Choose a platform and tap <strong>▶ Start</strong></div>
      </div>

      <div id="statsOverlay"></div>
      <div id="typingBadge">⌨ TYPING</div>

      <!-- Scroll buttons -->
      <div id="scrollControls">
        <button class="scroll-btn" id="sTop">⇈</button>
        <button class="scroll-btn" id="sUp">↑</button>
        <button class="scroll-btn" id="sDn">↓</button>
        <button class="scroll-btn" id="sBot">⇊</button>
      </div>
    </div>

    <!-- BOTTOM INPUT BAR -->
    <div class="bottombar">
      <input id="textInput" type="text" placeholder="Tap screen to focus, then type…" autocomplete="off"
        autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="icon-btn" onclick="sendText()" title="Send">⏎</button>
      <button class="icon-btn" onclick="sk('Backspace')" title="Backspace">⌫</button>
      <button class="icon-btn" onclick="sk('Escape')" title="Escape">✕</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────────
    // CONFIG — change SERVER_URL to your server IP:port
    // ─────────────────────────────────────────────────────────────────────────────
    const SERVER_URL = (() => {
      // Auto-detect: if this page is served from the Node server itself, use same host
      const loc = window.location;
      if (loc.hostname !== 'localhost' && loc.hostname !== '127.0.0.1' && loc.port === '3000') {
        return `${loc.protocol}//${loc.host}`;
      }
      // Fallback — edit this if serving client.html from somewhere else
      return `http://${loc.hostname}:3000`;
    })();

    const SERVER_W = 390;
    const SERVER_H = 844;

    // ─── DOM ─────────────────────────────────────────────────────────────────────
    const videoEl = document.getElementById('screen');
    const overlay = document.getElementById('overlay');
    const dot = document.getElementById('dot');
    const connLabel = document.getElementById('connLabel');
    const fpsLabel = document.getElementById('fpsLabel');
    const latLabel = document.getElementById('latLabel');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const platSel = document.getElementById('platformSel');
    const statsEl = document.getElementById('statsOverlay');
    const typingBadge = document.getElementById('typingBadge');
    const textInput = document.getElementById('textInput');
    const scrollCtrls = document.getElementById('scrollControls');
    const toast = document.getElementById('toast');

    // ─── STATE ────────────────────────────────────────────────────────────────────
    let sessionId = null;
    let ws = null;
    let pc = null;           // RTCPeerConnection
    let streaming = false;
    let typingMode = false;
    let logicalW = SERVER_W;
    let logicalH = SERVER_H;
    let lastMouseX = SERVER_W / 2;
    let lastMouseY = SERVER_H / 2;
    let inputBound = false;
    let pingInterval = null;
    let pingSentAt = 0;
    let reconnectN = 0;
    const MAX_RECON = 5;

    // ─── FPS counter ─────────────────────────────────────────────────────────────
    let frameCount = 0;
    setInterval(() => {
      if (streaming) { fpsLabel.style.display = ''; fpsLabel.textContent = frameCount + 'fps'; }
      frameCount = 0;
    }, 1000);

    // ─── Coordinate helpers ───────────────────────────────────────────────────────
    function getVideoRect() {
      const el = videoEl;
      const elW = el.clientWidth, elH = el.clientHeight;
      const vW = el.videoWidth || logicalW;
      const vH = el.videoHeight || logicalH;
      const elAR = elW / elH, vAR = vW / vH;
      let rW, rH, ox = 0, oy = 0;
      if (vAR > elAR) { rW = elW; rH = elW / vAR; oy = (elH - rH) / 2; }
      else { rH = elH; rW = elH * vAR; ox = (elW - rW) / 2; }
      const base = el.getBoundingClientRect();
      return { left: base.left + ox, top: base.top + oy, width: rW, height: rH };
    }
    const sx = cx => Math.round(((cx - getVideoRect().left) / getVideoRect().width) * logicalW);
    const sy = cy => Math.round(((cy - getVideoRect().top) / getVideoRect().height) * logicalH);
    const cx = x => Math.max(0, Math.min(logicalW - 1, x));
    const cy = y => Math.max(0, Math.min(logicalH - 1, y));

    // ─── Send to server ───────────────────────────────────────────────────────────
    function send(data) {
      if (ws?.readyState === WebSocket.OPEN && sessionId)
        ws.send(JSON.stringify({ sessionId, ...data }));
    }

    // ─── Status helpers ───────────────────────────────────────────────────────────
    function setStatus(s, label) {
      dot.className = 'dot ' + s;
      connLabel.textContent = label || s;
    }

    function showToast(msg, persist = false) {
      toast.textContent = msg;
      toast.classList.add('show');
      if (!persist) setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function hideToast() { toast.classList.remove('show'); }

    // ─── WebRTC peer connection ───────────────────────────────────────────────────
    function buildPC() {
      if (pc) { try { pc.close(); } catch (_) { } }

      pc = new RTCPeerConnection({
        iceServers,   // fetched from /ice-config before session starts
        iceCandidatePoolSize: 10,
        sdpSemantics: 'unified-plan',
        bundlePolicy: 'max-bundle',
        rtcpMuxPolicy: 'require',
      });

      // Collect tracks — assign srcObject once we have video
      pc._tracks = [];

      // We expect exactly 2 tracks: video + audio.
      // Wait until BOTH arrive before assigning srcObject and calling play().
      // Calling play() too early (with only 1 track) causes silent failure on
      // many mobile browsers.
      let _videoTrack = null;
      let _audioTrack = null;

      function tryAttach() {
        if (!_videoTrack) return; // need at least video
        const tracks = [_videoTrack];
        if (_audioTrack) tracks.push(_audioTrack);

        // Always build a fresh MediaStream — never mutate an existing one
        const ms = new MediaStream(tracks);
        videoEl.srcObject = ms;

        console.log('[WebRTC] srcObject set with', tracks.map(t => t.kind).join('+'));

        if ('requestVideoFrameCallback' in videoEl) {
          const tick = () => { frameCount++; videoEl.requestVideoFrameCallback(tick); };
          videoEl.requestVideoFrameCallback(tick);
        }

        videoEl.onloadedmetadata = () => {
          console.log('[WebRTC] Video size:', videoEl.videoWidth, 'x', videoEl.videoHeight);
          updateStats();
        };

        attemptPlay();
      }

      pc.ontrack = (e) => {
        console.log('[WebRTC] Track:', e.track.kind, e.track.readyState);
        pc._tracks.push(e.track);

        if (e.track.kind === 'video') {
          _videoTrack = e.track;
          tryAttach();
        }

        if (e.track.kind === 'audio') {
          _audioTrack = e.track;
          // If video already attached, rebuild srcObject to include audio
          if (videoEl.srcObject) tryAttach();
        }

        e.track.onended = () => {
          console.warn('[WebRTC] Track ended:', e.track.kind);
          if (streaming && e.track.kind === 'video') tryReconnect();
        };

        e.track.onmute = () => {
          console.warn('[WebRTC] Track muted:', e.track.kind);
          // Some browsers fire onmute briefly — don't reconnect immediately
          setTimeout(() => {
            if (e.track.muted && streaming && e.track.kind === 'video') {
              console.warn('[WebRTC] Track still muted after 3s — reconnecting');
              tryReconnect();
            }
          }, 3000);
        };
      };

      pc.onconnectionstatechange = () => {
        const s = pc.connectionState;
        console.log('[WebRTC]', s);
        if (s === 'connected') { setStatus('connected', 'live'); statsEl.classList.add('visible'); }
        if (s === 'connecting' || s === 'new') { setStatus('connecting', '…'); }
        if (s === 'disconnected' || s === 'failed') { setStatus('disconnected', 'lost'); if (streaming) tryReconnect(); }
      };

      pc.oniceconnectionstatechange = () => {
        console.log('[ICE]', pc.iceConnectionState);
      };

      // Add receive-only transceivers
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });

      // Prefer H264 (hardware decode on most phones) → VP8 fallback
      applyCodecPrefs();

      return pc;
    }

    function applyCodecPrefs() {
      try {
        const caps = RTCRtpReceiver.getCapabilities?.('video');
        if (!caps) return;
        const h264 = caps.codecs.filter(c => c.mimeType === 'video/H264');
        const vp8 = caps.codecs.filter(c => c.mimeType === 'video/VP8');
        const rest = caps.codecs.filter(c => c.mimeType !== 'video/H264' && c.mimeType !== 'video/VP8');
        const ordered = [...h264, ...vp8, ...rest];
        const vt = pc.getTransceivers().find(t => t.receiver.track.kind === 'video');
        if (vt && ordered.length) vt.setCodecPreferences(ordered);
      } catch (_) { }
    }

    // ─── Play with retries ────────────────────────────────────────────────────────
    let _playAttempted = false;
    let _waitFrameTimer = null;

    function attemptPlay() {
      // Already playing — just make sure overlay is hidden
      if (!videoEl.paused && videoEl.readyState >= 2) {
        console.log('[WebRTC] Already playing — srcObject updated');
        overlay.classList.add('hidden');
        return;
      }

      // Don't stack multiple attempts
      if (_playAttempted) return;
      _playAttempted = true;

      videoEl.muted = true;
      videoEl.volume = 0;

      overlay.classList.remove('hidden');
      overlay.innerHTML = `
    <div class="overlay-icon" style="animation:spin 1.2s linear infinite;display:inline-block">⟳</div>
    <div class="overlay-text">Loading stream…</div>`;

      // The root cause: readyState=0 means no frame data yet.
      // We must wait until the browser has actual frame data (readyState >= 2)
      // before calling play(), otherwise play() silently does nothing.
      function waitForData(cb) {
        // Already has data — go immediately
        if (videoEl.readyState >= 2) { cb(); return; }

        console.log('[WebRTC] Waiting for first frame data…');

        // Primary signal — fires when first frame is decoded
        const onReady = () => {
          cleanup();
          console.log('[WebRTC] First frame ready (readyState=' + videoEl.readyState + ')');
          cb();
        };

        // Fallback signals
        const onLoad = () => { cleanup(); cb(); };

        function cleanup() {
          clearTimeout(_waitFrameTimer);
          videoEl.removeEventListener('loadeddata', onReady);
          videoEl.removeEventListener('canplay', onReady);
          videoEl.removeEventListener('loadedmetadata', onLoad);
        }

        videoEl.addEventListener('loadeddata', onReady, { once: true });
        videoEl.addEventListener('canplay', onReady, { once: true });
        videoEl.addEventListener('loadedmetadata', onLoad, { once: true });

        // Polling fallback — some browsers on mobile never fire the above events
        // when srcObject is set from a WebRTC stream. Poll readyState every 200ms.
        let pollCount = 0;
        const poll = setInterval(() => {
          pollCount++;
          if (videoEl.readyState >= 2) {
            clearInterval(poll);
            cleanup();
            console.log('[WebRTC] First frame ready (polled, readyState=' + videoEl.readyState + ')');
            cb();
            return;
          }
          // Also check if tracks are delivering data
          const vTrack = videoEl.srcObject?.getVideoTracks()[0];
          if (vTrack && vTrack.readyState === 'live') {
            // Force a re-assignment to wake up stalled decoders on some browsers
            if (pollCount === 5) {
              console.log('[WebRTC] Nudging srcObject to wake decoder…');
              const ms = videoEl.srcObject;
              videoEl.srcObject = null;
              videoEl.srcObject = ms;
            }
          }
          if (pollCount >= 30) { // 6 seconds max wait
            clearInterval(poll);
            cleanup();
            console.warn('[WebRTC] Timeout waiting for frame data — attempting play anyway');
            cb();
          }
        }, 200);

        _waitFrameTimer = setTimeout(() => {
          clearInterval(poll);
          cleanup();
          cb();
        }, 8000);
      }

      waitForData(() => {
        const doPlay = () => {
          return videoEl.play().then(() => {
            console.log('[WebRTC] ▶ Playing — readyState=' + videoEl.readyState);
            _playAttempted = false;
            overlay.classList.add('hidden');
            reconnectN = 0;
            // Unmute after play() resolves — browser requires this order
            setTimeout(() => {
              videoEl.muted = false;
              videoEl.volume = 1;
              console.log('[WebRTC] Audio unmuted');
            }, 300);
          });
        };

        doPlay().catch(err => {
          console.warn('[WebRTC] play() failed:', err.name, err.message);
          // NotAllowedError = autoplay blocked — show manual play button
          if (err.name === 'NotAllowedError') {
            _playAttempted = false;
            showPlayOverlay();
            return;
          }
          // Any other error — retry once after 500ms
          setTimeout(() => {
            doPlay().catch(() => { _playAttempted = false; showPlayOverlay(); });
          }, 500);
        });
      });
    }

    function showPlayOverlay() {
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
    <div class="overlay-icon">▶</div>
    <div class="overlay-text">Tap to start stream</div>
    <button class="play-btn" onclick="manualPlay()">▶ Play</button>`;
    }

    function manualPlay() {
      videoEl.muted = false;
      videoEl.play().then(() => overlay.classList.add('hidden')).catch(console.error);
    }

    // ─── Stats overlay ────────────────────────────────────────────────────────────
    function updateStats() {
      const w = videoEl.videoWidth, h = videoEl.videoHeight;
      if (w) statsEl.textContent = `${w}×${h}`;
    }

    setInterval(() => {
      if (!streaming) return;
      const lat = latLabel.textContent;
      const fps = fpsLabel.textContent;
      statsEl.textContent = [
        videoEl.videoWidth ? `${videoEl.videoWidth}×${videoEl.videoHeight}` : '',
        fps, lat
      ].filter(Boolean).join('  ');
      if (latLabel.textContent !== '·') latLabel.style.display = '';
    }, 1000);

    // ─── ICE servers (fetched from server so credentials stay server-side) ────────
    let iceServers = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ];

    async function fetchIceConfig() {
      try {
        const r = await fetch(SERVER_URL + '/ice-config');
        if (r.ok) {
          const data = await r.json();
          if (data.iceServers?.length) {
            iceServers = data.iceServers;
            console.log('[ICE] Config loaded from server:', iceServers.length, 'servers');
          }
        }
      } catch (e) {
        console.warn('[ICE] Could not fetch config, using defaults:', e.message);
      }
    }

    // ─── Session flow ─────────────────────────────────────────────────────────────
    async function startSession() {
      setStatus('connecting', '…');
      startBtn.disabled = true;
      platSel.disabled = true;
      _playAttempted = false;

      overlay.classList.remove('hidden');
      overlay.innerHTML = `
    <div class="overlay-icon" style="animation:spin 1.2s linear infinite;display:inline-block">⟳</div>
    <div class="overlay-text">Starting session…</div>`;

      // Fetch ICE/TURN config from server first
      await fetchIceConfig();

      try {
        const r = await fetch(SERVER_URL + '/start-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform: platSel.value }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
        const data = await r.json();
        sessionId = data.sessionId;
        if (data.width) logicalW = data.width;
        if (data.height) logicalH = data.height;
        console.log('[Session]', sessionId);
        openWS();
      } catch (err) {
        console.error(err);
        showToast('Failed: ' + err.message);
        setStatus('disconnected', 'error');
        resetControls();
      }
    }

    function openWS() {
      const proto = SERVER_URL.startsWith('https') ? 'wss' : 'ws';
      const host = SERVER_URL.replace(/^https?:\/\//, '');
      ws = new WebSocket(`${proto}://${host}`);

      ws.onopen = async () => {
        console.log('[WS] open');
        overlay.innerHTML = `
      <div class="overlay-icon" style="animation:spin 1.2s linear infinite;display:inline-block">⟳</div>
      <div class="overlay-text">Negotiating connection…</div>`;
        startPing();

        buildPC();

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Wait for ICE gathering — up to 5s for remote connections
        await new Promise(res => {
          if (pc.iceGatheringState === 'complete') { res(); return; }
          const fn = () => { if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', fn); res(); } };
          pc.addEventListener('icegatheringstatechange', fn);
          setTimeout(() => { pc.removeEventListener('icegatheringstatechange', fn); res(); }, 5000);
        });

        send({ type: 'start-stream', offerSdp: pc.localDescription.sdp });
        console.log('[WebRTC] Offer sent');
      };

      ws.onmessage = async (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }

        if (msg.type === 'pong') {
          const rtt = Date.now() - pingSentAt;
          latLabel.textContent = rtt + 'ms';
          latLabel.style.display = '';
          return;
        }

        if (msg.type === 'webrtc-answer') {
          const sdp = typeof msg.sdpAnswer === 'string' ? msg.sdpAnswer : msg.sdpAnswer?.sdp;
          if (!sdp) { console.error('Empty SDP'); return; }
          try {
            await pc.setRemoteDescription({ type: 'answer', sdp });
            console.log('[WebRTC] Answer accepted ✓');
          } catch (e) { console.error('[WebRTC] setRemoteDescription:', e.message); }
          return;
        }

        handleControl(msg);
      };

      ws.onclose = () => {
        stopPing();
        if (streaming) tryReconnect();
        else cleanup();
      };

      ws.onerror = (e) => {
        console.error('[WS] error', e);
        stopPing();
        setStatus('disconnected', 'error');
      };
    }

    function handleControl(msg) {
      switch (msg.type) {
        case 'stream-started':
          streaming = true;
          stopBtn.disabled = false;
          if (msg.width) logicalW = msg.width;
          if (msg.height) logicalH = msg.height;
          scrollCtrls.classList.add('visible');
          bindInput();
          textInput.focus();
          hideToast();
          console.log('[Stream] started');
          break;
        case 'stream-stopped':
          streaming = false;
          break;
        case 'session-ended':
          showToast(msg.message || 'Session ended');
          cleanup();
          break;
        case 'error':
          console.error('[Server]', msg.message);
          showToast('Server: ' + msg.message);
          break;
      }
    }

    // ─── Ping keepalive (prevent proxy 60s timeout) ───────────────────────────────
    function startPing() {
      stopPing();
      pingInterval = setInterval(() => {
        if (ws?.readyState === WebSocket.OPEN) {
          pingSentAt = Date.now();
          send({ type: 'ping' });
        }
      }, 20000);
    }
    function stopPing() { clearInterval(pingInterval); pingInterval = null; }

    // ─── Auto-reconnect ───────────────────────────────────────────────────────────
    function tryReconnect() {
      if (!sessionId || reconnectN >= MAX_RECON) {
        showToast('Connection lost. Tap Start to retry.', true);
        cleanup();
        return;
      }
      reconnectN++;
      const delay = Math.min(Math.pow(2, reconnectN) * 800, 8000);
      showToast(`Reconnecting… (${reconnectN}/${MAX_RECON})`);
      setStatus('connecting', '…');
      setTimeout(() => { if (streaming || reconnectN > 0) openWS(); }, delay);
    }

    // ─── Stop / cleanup ───────────────────────────────────────────────────────────
    function stopSession() {
      reconnectN = MAX_RECON; // block auto-reconnect
      if (ws?.readyState === WebSocket.OPEN) {
        send({ type: 'stop-stream' });
        ws.close();
      }
      cleanup();
    }

    function cleanup() {
      streaming = false;
      typingMode = false;
      inputBound = false;
      _playAttempted = false;
      if (_waitFrameTimer) { clearTimeout(_waitFrameTimer); _waitFrameTimer = null; }
      stopPing();
      resetControls();
      disarmTyping();
      scrollCtrls.classList.remove('visible');
      statsEl.classList.remove('visible');
      fpsLabel.style.display = 'none';
      latLabel.style.display = 'none';

      if (pc) { try { pc.close(); } catch (_) { } pc = null; }
      if (videoEl.srcObject) {
        videoEl.srcObject.getTracks().forEach(t => t.stop());
        videoEl.srcObject = null;
      }
      videoEl.muted = true;
      overlay.classList.remove('hidden');
      overlay.innerHTML = `<div class="overlay-icon">📱</div><div class="overlay-text">Choose a platform and tap <strong>▶ Start</strong></div>`;
      setStatus('disconnected', 'off');
    }

    function resetControls() {
      startBtn.disabled = false;
      platSel.disabled = false;
      stopBtn.disabled = true;
    }

    // ─── INPUT: bind once after stream starts ─────────────────────────────────────
    function bindInput() {
      if (inputBound) return;
      inputBound = true;

      // ── Click / Tap ──────────────────────────────────────────────────────────
      videoEl.addEventListener('click', e => {
        if (!streaming) return;
        e.preventDefault();
        const x = cx(sx(e.clientX)), y = cy(sy(e.clientY));
        send({ type: 'click', x, y });
        armTyping();
      });

      // ── Mouse wheel ──────────────────────────────────────────────────────────
      videoEl.addEventListener('wheel', e => {
        e.preventDefault();
        if (!streaming) return;
        let dx = e.deltaX, dy = e.deltaY;
        if (e.deltaMode === 1) { dx *= 40; dy *= 40; }
        if (e.deltaMode === 2) { dx *= 800; dy *= 800; }
        dx = Math.max(-600, Math.min(600, dx));
        dy = Math.max(-600, Math.min(600, dy));
        send({ type: 'scroll', x: cx(sx(e.clientX)), y: cy(sy(e.clientY)), deltaX: Math.round(dx), deltaY: Math.round(dy) });
      }, { passive: false });

      // ── Touch ────────────────────────────────────────────────────────────────
      let tStartX = 0, tStartY = 0, tLastY = 0, tStartTime = 0, tVel = 0, tLastTime = 0, momentumRAF = null;

      videoEl.addEventListener('touchstart', e => {
        e.preventDefault();
        if (momentumRAF) { cancelAnimationFrame(momentumRAF); momentumRAF = null; }
        const t = e.touches[0];
        tStartX = t.clientX; tStartY = t.clientY; tLastY = t.clientY;
        tStartTime = tLastTime = Date.now(); tVel = 0;
      }, { passive: false });

      videoEl.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!streaming) return;
        const t = e.touches[0];
        const now = Date.now(), dt = now - tLastTime || 1;
        const rawDy = tLastY - t.clientY;
        tVel = rawDy / dt; tLastTime = now; tLastY = t.clientY;
        const dy = rawDy * 2.5;
        if (Math.abs(dy) < 1) return;
        send({ type: 'scroll', x: cx(sx(tStartX)), y: Math.round(logicalH / 2), deltaX: 0, deltaY: Math.round(dy) });
      }, { passive: false });

      videoEl.addEventListener('touchend', e => {
        e.preventDefault();
        if (!streaming) return;
        const t = e.changedTouches[0];
        const dt = Date.now() - tStartTime;
        const dx = Math.abs(t.clientX - tStartX), dy = Math.abs(t.clientY - tStartY);
        if (dt < 300 && dx < 12 && dy < 12) {
          const x = cx(sx(tStartX)), y = cy(sy(tStartY));
          send({ type: 'click', x, y });
          armTyping();
          return;
        }
        // Momentum
        let vel = tVel * 2.5;
        const decay = 0.93;
        const rx = cx(sx(tStartX));
        function momentum() {
          if (Math.abs(vel) < 0.4 || !streaming) { momentumRAF = null; return; }
          send({ type: 'scroll', x: rx, y: Math.round(logicalH / 2), deltaX: 0, deltaY: Math.round(vel * 16) });
          vel *= decay;
          momentumRAF = requestAnimationFrame(momentum);
        }
        if (Math.abs(tVel) > 0.2) momentumRAF = requestAnimationFrame(momentum);
      }, { passive: false });

      videoEl.addEventListener('mousemove', e => {
        lastMouseX = cx(sx(e.clientX)); lastMouseY = cy(sy(e.clientY));
      }, { passive: true });

      console.log('[Input] bound');
    }

    // ─── Scroll buttons ───────────────────────────────────────────────────────────
    function makeScroll(id, dy) {
      const btn = document.getElementById(id); if (!btn) return;
      let iv = null;
      const fire = () => { if (streaming) send({ type: 'scroll', x: Math.round(logicalW / 2), y: Math.round(logicalH / 2), deltaX: 0, deltaY: dy }); };
      btn.addEventListener('mousedown', e => { e.preventDefault(); fire(); iv = setInterval(fire, 80); });
      btn.addEventListener('touchstart', e => { e.preventDefault(); fire(); iv = setInterval(fire, 80); }, { passive: false });
      btn.addEventListener('mouseup', () => clearInterval(iv));
      btn.addEventListener('mouseleave', () => clearInterval(iv));
      btn.addEventListener('touchend', () => clearInterval(iv));
    }
    makeScroll('sTop', -3000);
    makeScroll('sUp', -300);
    makeScroll('sDn', 300);
    makeScroll('sBot', 3000);

    // Focus textInput on video click (capture phase — runs before click handler)
    videoEl.addEventListener('click', () => textInput.focus(), { capture: true });

    // ─── Typing mode ──────────────────────────────────────────────────────────────
    function armTyping() {
      if (!streaming) return;
      typingMode = true;
      typingBadge.classList.add('active');
      textInput.classList.add('active');
      textInput.placeholder = '⌨ Typing into remote screen…';
      textInput.focus();
    }
    function disarmTyping() {
      typingMode = false;
      typingBadge.classList.remove('active');
      textInput.classList.remove('active');
      textInput.placeholder = 'Tap screen to focus, then type…';
    }

    // ─── Text input events ────────────────────────────────────────────────────────
    textInput.addEventListener('keydown', e => {
      if (!streaming) return;
      if (e.key === 'Escape') { e.preventDefault(); disarmTyping(); return; }
      e.stopPropagation();
      if (e.key === 'Enter') { e.preventDefault(); send({ type: 'keypress', key: 'Enter' }); textInput.value = ''; return; }
      if (e.key === 'Backspace') { e.preventDefault(); send({ type: 'keypress', key: 'Backspace' }); textInput.value = textInput.value.slice(0, -1); return; }
      if (e.key === 'Tab') { e.preventDefault(); send({ type: 'keypress', key: 'Tab' }); return; }
    });

    textInput.addEventListener('input', e => {
      if (!streaming || !textInput.value) return;
      send({ type: 'type', text: textInput.value });
      textInput.value = '';
    });

    // ─── Global keyboard fallback (when textInput not focused) ────────────────────
    document.addEventListener('keydown', e => {
      if (document.activeElement === textInput) return;
      if (!streaming) return;
      const scrollMap = { ArrowDown: 120, ArrowUp: -120, PageDown: 600, PageUp: -600 };
      if (scrollMap[e.key] !== undefined) {
        e.preventDefault();
        send({ type: 'scroll', x: lastMouseX, y: lastMouseY, deltaX: 0, deltaY: scrollMap[e.key] });
        return;
      }
      if (e.key === 'Escape') { disarmTyping(); return; }
      e.preventDefault();
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) send({ type: 'keypress', key: e.key });
      else send({ type: 'keydown', key: e.key });
    });

    document.addEventListener('keyup', e => {
      if (document.activeElement === textInput || !streaming) return;
      if (e.key.length > 1) send({ type: 'keyup', key: e.key });
    });

    // ─── Toolbar helpers ──────────────────────────────────────────────────────────
    function sendText() {
      const v = textInput.value.trim(); if (!v) return;
      send({ type: 'type', text: v }); textInput.value = ''; textInput.focus();
    }
    function sk(key) { if (!streaming) return; send({ type: 'keypress', key }); textInput.focus(); }

    // ─── Prevent context menu on video (long-press on mobile) ─────────────────────
    videoEl.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>

</html>
